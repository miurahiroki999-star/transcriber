# ============================================================
# netlify.toml
# Netlify 設定ファイル
# ============================================================

[build]
  # ビルドコマンド（静的サイトなのでビルド不要）
  command = ""
  # 公開ディレクトリ（index.htmlがあるルート）
  publish = "."
  # Functions ディレクトリ
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."transcribe"]
  # タイムアウト設定（秒）
  # 注意：Netlify無料プランの上限は10秒。有料プランは最大26秒。
  # 自動分割モードではチャンクを1つずつ送るため、1チャンクあたり26秒以内に完了する必要があります。
  # 90秒チャンクでも環境によってタイムアウトする場合があります。失敗する場合は60秒に変更してください。
  timeout = 26

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
